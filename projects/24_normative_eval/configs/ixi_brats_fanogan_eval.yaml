name: fAnoGAN_IXI_BraTS_Eval
target_size: &target_size !!python/tuple [128, 128]
train_batch_size: &tbatch_size 256
downstream_batch_size: &dbatch_size 128
num_workers: &num_workers 8
checkpoint_path: &checkpoint_path ./weights/IXI_BraTS/f-anogan/

experiment:
  name: IXI_BraTS_AnomalyDetection
  task: test
  weights: './weights/IXI_BraTS/f-anogan/2025_12_21_14_23_26_758157/best_model.pt'

device: gpu
configurator:
  module_name: core.Configurator
  class_name: DLConfigurator
  params:

#
# Model - f-AnoGAN (Fast Anomaly GAN)
#
model:
  module_name: model_zoo.f-anogan
  class_name: fAnoGAN
  params:
    wgan_path: './weights/IXI_BraTS/wgan/2025_12_17_22_59_28_441365/best_model.pt'
    image_size: 128
    channels: 1
    latent_dim: 128

trainer:
  module_name: projects.24_normative_eval.trainers.fAnoGANTrainer
  class_name: PTrainer
  params:
    input_size: *target_size
    checkpoint_path: *checkpoint_path
    batch_size: *tbatch_size
    nr_epochs: 1500
    patience: 500
    loss:
      module_name: optim.losses.ln_losses
      class_name: L2
      params:
    optimizer_params:
      lr: 1.0e-4
  data_loader:
    module_name: core.DataLoader
    class_name: DefaultDataLoader
    params:
      args:
        dataset_module:
          module_name: data.loaders.brain_loader
          class_name: BrainLoader
        data_dir:
          train:
            - './data/IXI_BraTS/splits/ixi_train.csv'
          val:
            - './data/IXI_BraTS/splits/ixi_val.csv'
          test:
            - './data/IXI_BraTS/splits/ixi_val.csv'
        target_size: *target_size
        batch_size: *tbatch_size
        num_workers: *num_workers

downstream_tasks:
  brats_detection:
    module_name: projects.24_normative_eval.DownstreamEvaluatorAtlas
    class_name: PDownstreamEvaluator
    checkpoint_path: *checkpoint_path
    data_loader:
      module_name: core.DataLoader
      class_name: DefaultDataLoader
      params:
        args:
          target_size: *target_size
          batch_size: *dbatch_size
          num_workers: *num_workers
          dataset_module:
            module_name: data.loaders.brain_loader
            class_name: BrainLoader
      datasets:
        BraTS:
          data_dir:
            test:
              - './data/IXI_BraTS/splits/brats_test.csv'
          label_dir:
            test:
              - './data/IXI_BraTS/splits/brats_test_masks.csv'
          mask_dir:
            test:
              - './data/IXI_BraTS/splits/brats_test_neg.csv'
