name: AnoDDPM_IXI_BraTS
target_size: &target_size !!python/tuple [128, 128]
train_batch_size: &tbatch_size 16
downstream_batch_size: &dbatch_size 1
num_workers: &num_workers 8
checkpoint_path: &checkpoint_path ./weights/IXI_BraTS/anoddpm/

#
# Experiment
#
experiment:
  name: IXI_BraTS_AnomalyDetection
  task: train
  weights: null

device: gpu
configurator:
  module_name: core.Configurator
  class_name: DLConfigurator
  params:

#
# Model - AnoDDPM (Denoising Diffusion for Anomaly Detection)
#
model:
  module_name: model_zoo.ddpm
  class_name: DDPM
  params:
    spatial_dims: 2
    in_channels: 1
    out_channels: 1
    num_channels: 
      - 128
      - 256
      - 256
    attention_levels:
      - False
      - True
      - True
    num_res_blocks: 1
    num_head_channels: 256

    # Scheduling and noising scheme
    train_scheduler: "ddpm"
    inference_scheduler: "ddpm"
    inference_steps: 1000
    noise_level_recon: 250
    noise_type: "gaussian"
    prediction_type: "epsilon"

    threshold_low: 1
    threshold_high: 10000

    image_path: './projects/24_normative_eval/images/anoddpm_ixi_brats'

#
# Trainer
#
trainer:
  module_name: projects.24_normative_eval.trainers.AnoTrainer
  class_name: PTrainer
  params:
    input_size: *target_size
    checkpoint_path: *checkpoint_path
    batch_size: *tbatch_size
    nr_epochs: 3000
    val_interval: 50
    patience: 500
    loss:
      module_name: optim.losses.ln_losses
      class_name: L2
      params:
    optimizer_params:
      lr: 1.0e-4
  data_loader:
    module_name: core.DataLoader
    class_name: DefaultDataLoader
    params:
      args:
        target_size: *target_size
        batch_size: *tbatch_size
        num_workers: *num_workers
        dataset_module:
          module_name: data.loaders.brain_loader
          class_name: BrainLoader
        data_dir:
          train:
            - './data/IXI_BraTS/splits/ixi_train.csv'
          val:
            - './data/IXI_BraTS/splits/ixi_val.csv'
          test:
            - './data/IXI_BraTS/splits/ixi_val.csv'

downstream_tasks:
  brats_detection:
    module_name: projects.24_normative_eval.DownstreamEvaluator
    class_name: PDownstreamEvaluator
    checkpoint_path: *checkpoint_path
    params:
      task: 'detection'
      normal_path: './weights/IXI_BraTS/Normal_brain_train/*.png'
    data_loader:
      module_name: core.DataLoader
      class_name: DefaultDataLoader
      params:
        args:
          target_size: *target_size
          batch_size: *dbatch_size
          dataset_module:
            module_name: data.loaders.brain_loader
            class_name: BrainLoader
      datasets:
        BraTS:
          data_dir:
            test:
              - './data/IXI_BraTS/splits/brats_test.csv'
          label_dir:
            test:
              - './data/IXI_BraTS/splits/brats_test_masks.csv'
          mask_dir:
            test:
              - './data/IXI_BraTS/splits/brats_test_neg.csv'
